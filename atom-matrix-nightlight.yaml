substitutions:
  device_name: atom-matrix-nightlight
  friendly_name: "Atom Matrix Night Light"
  log_level: INFO
  pir_pin: GPIO22          # ToUnit Base IO2 (white wire = PIR digital output)
  timeout_minutes: "2"     # How long LEDs stay on after motion stops

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "M5Stack Atom Matrix — PIR night light with day/night modes"

esp32:
  board: m5stack-atom
  framework:
    type: arduino           # Required — ESP32-PICO-D4 has no IDF support in ESPHome

# ─── Logging ──────────────────────────────────────────────────────────────────
logger:
  level: ${log_level}

# ─── API ──────────────────────────────────────────────────────────────────────
api:
  encryption:
    key: !secret api_key

# ─── OTA ──────────────────────────────────────────────────────────────────────
ota:
  - platform: esphome

# ─── Wi-Fi ────────────────────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_password

captive_portal:

# ─── Time ─────────────────────────────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time

# ─── Sun ──────────────────────────────────────────────────────────────────────
sun:
  latitude: !secret latitude
  longitude: !secret longitude

# ─── Globals ──────────────────────────────────────────────────────────────────
globals:
  - id: night_mode          # true = after sunset, false = daytime
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: lights_on           # true = matrix currently illuminated
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: wipe_step            # counter for daytime wipe animation
    type: int
    restore_value: no
    initial_value: '0'  

# ─── 5x5 RGB LED Matrix ───────────────────────────────────────────────────────
# WS2812C on G27, 25 LEDs — keep brightness ≤ 20% per M5Stack warning
light:
  - platform: neopixelbus
    type: GRB
    variant: WS2812X
    pin: GPIO27
    num_leds: 25
    name: "Matrix"
    id: matrix
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s

# ─── Timeout Script ───────────────────────────────────────────────────────────
# mode: restart means every new motion event resets the 2 min clock
script:
  - id: motion_timeout
    mode: restart
    then:
      - delay: !lambda return ${timeout_minutes} * 60 * 1000;
      - light.turn_off:
          id: matrix
          transition_length: 3s   # Slow fade to off in dark hallway
      - lambda: id(lights_on) = false;

# ─── PIR + Button ─────────────────────────────────────────────────────────────
binary_sensor:
  # PIR Unit: digital output on white wire → ToUnit Base IO2 → GPIO22
  # Hardware has 2s fixed delay and repeatable trigger
  - platform: gpio
    pin:
      number: ${pir_pin}
      mode: INPUT
    name: "Motion"
    device_class: motion
    on_press:
      then:
        - lambda: id(lights_on) = true;
        - if:
            condition:
              lambda: return id(night_mode);
            then:
              # ── Night — warm amber glow ───────────────────────────────────
              - light.turn_on:
                  id: matrix
                  brightness: 70%
                  red: 100%
                  green: 60%
                  blue: 0%
            else:
              # ── Day — cyan wipe across 25 LEDs then fade ─────────────────
              - lambda: id(wipe_step) = 0;
              - repeat:
                  count: 25
                  then:
                    - light.addressable_set:
                        id: matrix
                        range_from: 0
                        range_to: !lambda return id(wipe_step);
                        red: 0%
                        green: 60%
                        blue: 100%
                    - lambda: id(wipe_step) += 1;
                    - delay: 40ms
              - delay: 800ms
              - light.turn_on:
                  id: matrix
                  brightness: 10%                    
                  red: 0%
                  green: 60%
                  blue: 100%
              - delay: 500ms
              - light.turn_off:
                  id: matrix
                  transition_length: 1s
        - script.execute: motion_timeout
 
    on_release:
      then:
        - script.execute: motion_timeout

  # Atom Matrix button G39 — manual toggle override
  - platform: gpio
    pin:
      number: GPIO39
      mode: INPUT
      inverted: true
    name: "Button"
    on_press:
      then:
        - if:
            condition:
              light.is_on: matrix
            then:
              - script.stop: motion_timeout
              - light.turn_off:
                  id: matrix
                  transition_length: 500ms
              - lambda: id(lights_on) = false;
            else:
              - light.turn_on:
                  id: matrix
                  brightness: 60%
                  red: 100%
                  green: 60%
                  blue: 0%
              - lambda: id(lights_on) = true;
              - script.execute: motion_timeout

# ─── Sun Elevation Interval ───────────────────────────────────────────────────
# Checks sun elevation every 60s — below 0 = night
interval:
  - interval: 60s
    then:
      - lambda: |-
          id(night_mode) = id(sun_elevation).state < 0.0;

# ─── Sensors ──────────────────────────────────────────────────────────────────
sensor:
  - platform: sun
    name: "Sun Elevation"
    id: sun_elevation
    type: elevation
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s
    entity_category: diagnostic

# ─── Text Sensors ─────────────────────────────────────────────────────────────
text_sensor:
  - platform: sun
    name: "Sun Phase"
    type: sunrise
    entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
    mac_address:
      name: "MAC Address"
      entity_category: diagnostic

  - platform: version
    name: "ESPHome Version"
    entity_category: diagnostic
